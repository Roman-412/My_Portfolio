<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ProExam Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
display:flex;
flex-direction:column;
color:white;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.logo{
font-size:22px;
font-weight:bold;
}

nav ul{
list-style:none;
display:flex;
}

nav ul li{
margin-left:30px;
}

nav ul li a{
color:white;
text-decoration:none;
cursor:pointer;
transition:0.3s;
}

nav ul li a:hover{
color:#00f5d4;
}

.page{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
}

.card{
background:rgba(255,255,255,0.08);
padding:35px;
border-radius:20px;
width:450px;
backdrop-filter:blur(20px);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1,h2{
margin-bottom:15px;
}

select,button{
width:100%;
padding:10px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:14px;
}

select{
background:white;
color:black;
}

button{
background:#00f5d4;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00c9a7;
}

.hidden{
display:none;
}

#timer{
color:#ff4d4d;
font-weight:bold;
margin-bottom:10px;
}

#progress{
margin-bottom:10px;
font-size:13px;
opacity:0.8;
}

label{
display:block;
margin:8px 0;
cursor:pointer;
}

footer{
text-align:center;
padding:15px;
background:rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<nav>
<div class="logo">ProExam</div>
<ul>
<li><a onclick="showPage('home')">Home</a></li>
<li><a onclick="showPage('exam')">Exams</a></li>
<li><a onclick="showPage('result')">Result</a></li>
<li><a onclick="showPage('contact')">Contact</a></li>
</ul>
</nav>

<section id="home" class="page">
<div class="card">
<h1>Welcome to ProExam</h1>
<p>Professional Online Assessment Platform</p>
</div>
</section>

<section id="exam" class="page hidden">
<div class="card">
<h2>Select Category</h2>

<select id="category">
<option value="">--Choose Category--</option>
<option value="html">HTML</option>
<option value="css">CSS</option>
<option value="js">JavaScript</option>
<option value="python">Python</option>
<option value="sql">SQL</option>
<option value="react">React</option>
<option value="problem">Problem Solving</option>
<option value="english">English General</option>
</select>

<button onclick="startExam()">Start Exam</button>

<div id="quizBox" class="hidden">
<div id="timer"></div>
<div id="progress"></div>
<h3 id="question"></h3>
<div id="options"></div>
<button onclick="nextQuestion()">Next</button>
</div>

</div>
</section>

<section id="result" class="page hidden">
<div class="card">
<h2>Exam Result</h2>
<p id="score"></p>
</div>
</section>

<section id="contact" class="page hidden">
<div class="card">
<h2>Contact</h2>
<p>Email: support@proexam.com</p>
</div>
</section>

<footer>
© 2026 ProExam | Developed by Ranjith Kumar
</footer>

<script>

let questions={
html:[
{q:"HTML stands for?",o:["Hyper Text Markup Language","High Text","Hyper Tab","None"],a:0},
{q:"Paragraph tag?",o:["&lt;p&gt;","&lt;h1&gt;","&lt;div&gt;","&lt;br&gt;"],a:0},
{q:"HTML file extension?",o:[".html",".doc",".ht",".web"],a:0},
{q:"Hyperlink tag?",o:["&lt;a&gt;","&lt;link&gt;","&lt;href&gt;","&lt;url&gt;"],a:0},
{q:"Image tag?",o:["&lt;img&gt;","&lt;pic&gt;","&lt;image&gt;","&lt;src&gt;"],a:0}
],
css:[
{q:"CSS stands for?",o:["Cascading Style Sheets","Color Style","Creative Sheet","None"],a:0},
{q:"Text color property?",o:["color","font","background","size"],a:0},
{q:"Background property?",o:["background","bgcolor","color","none"],a:0},
{q:"Center text?",o:["text-align","align","position","display"],a:0},
{q:"Add border?",o:["border","outline","line","box"],a:0}
],
js:[
{q:"JS stands for?",o:["JavaScript","JavaSource","JustScript","None"],a:0},
{q:"Declare variable?",o:["let","var","const","All"],a:3},
{q:"Console output?",o:["console.log","print","echo","write"],a:0},
{q:"Array method?",o:["push","add","insert","append"],a:0},
{q:"DOM full form?",o:["Document Object Model","Data Object","Display","None"],a:0}
],
python:[
{q:"Python file extension?",o:[".py",".pt",".code",".txt"],a:0},
{q:"Print function?",o:["print()","echo()","log()","write()"],a:0},
{q:"List syntax?",o:["[]","{}","()","<>"],a:0},
{q:"Loop keyword?",o:["for","loop","iterate","repeat"],a:0},
{q:"Define function?",o:["def","fun","create","make"],a:0}
],
sql:[
{q:"Retrieve data?",o:["SELECT","GET","SHOW","FETCH"],a:0},
{q:"Insert data?",o:["INSERT","ADD","PUT","NEW"],a:0},
{q:"Delete data?",o:["DELETE","REMOVE","DROP","CLEAR"],a:0},
{q:"Update data?",o:["UPDATE","CHANGE","MODIFY","EDIT"],a:0},
{q:"Primary key?",o:["Unique id","Duplicate","Null","None"],a:0}
],
react:[
{q:"React is?",o:["Library","Framework","Language","DB"],a:0},
{q:"State hook?",o:["useState","useEffect","useRef","useMemo"],a:0},
{q:"Router used for?",o:["Navigation","API","CSS","DB"],a:0},
{q:"JSX stands for?",o:["JavaScript XML","JSON","None","JavaSyntax"],a:0},
{q:"Component created by?",o:["function","class","both","none"],a:2}
],
problem:[
{q:"5 + 3 = ?",o:["8","7","6","9"],a:0},
{q:"10 / 2 = ?",o:["5","2","4","6"],a:0},
{q:"Square of 4?",o:["16","8","12","20"],a:0},
{q:"Prime number?",o:["7","8","9","10"],a:0},
{q:"Factorial of 3?",o:["6","3","9","12"],a:0}
],
english:[
{q:"Synonym of Happy?",o:["Joyful","Sad","Angry","Cry"],a:0},
{q:"Opposite of Big?",o:["Small","Large","Huge","Tall"],a:0},
{q:"Plural of Child?",o:["Children","Childs","Childes","None"],a:0},
{q:"Article for apple?",o:["An","A","The","None"],a:0},
{q:"Past tense of go?",o:["Went","Goed","Gone","Going"],a:0}
]
};

let current=0,score=0,selectedCategory="",timer,timeLeft=60;

function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

function startExam(){
selectedCategory=document.getElementById("category").value;
if(!selectedCategory){alert("Select category");return;}
current=0;score=0;timeLeft=60;
document.getElementById("quizBox").classList.remove("hidden");
showQuestion();
startTimer();
}

function showQuestion(){
let q=questions[selectedCategory][current];
document.getElementById("progress").innerText=
"Question "+(current+1)+" of "+questions[selectedCategory].length;
document.getElementById("question").innerHTML=q.q;

let optionsHTML="";
q.o.forEach((opt,i)=>{
optionsHTML+=`
<label>
<input type="radio" name="opt" value="${i}">
${opt}
</label>`;
});
document.getElementById("options").innerHTML=optionsHTML;
}

function nextQuestion(){
let selected=document.querySelector('input[name="opt"]:checked');
if(!selected){alert("Please select an option!");return;}

if(parseInt(selected.value)===questions[selectedCategory][current].a){
score++;
}

current++;

if(current<questions[selectedCategory].length){
showQuestion();
}else{
clearInterval(timer);
document.getElementById("score").innerText=
"You scored "+score+" / "+questions[selectedCategory].length;
showPage("result");
}
}

function startTimer(){
timer=setInterval(()=>{
timeLeft--;
document.getElementById("timer").innerText="Time Left: "+timeLeft+"s";
if(timeLeft<=0){
clearInterval(timer);
document.getElementById("score").innerText=
"Time Up! Score: "+score+" / "+questions[selectedCategory].length;
showPage("result");
}
},1000);
}

</script>

</body>
</html>
